# Serverless Docker Execution Service - Runtime Configuration
# This file provides runtime-configurable settings for the serverless worker.
# Changes to this file take effect on worker restart.

[registry]
# Comma-separated list of allowed container registries.
# Images must come from one of these registries to be accepted.
# Images without an explicit registry prefix default to docker.io.
whitelist = docker.io, ghcr.io, registry.example.com

[resources]
# Default memory limit applied to each container (Docker --memory flag)
default_memory_limit = 512m

# Default CPU limit applied to each container (Docker --cpus flag)
default_cpu_limit = 1

# Maximum number of concurrent jobs across all workers
max_concurrent_jobs = 100

[timeouts]
# Default job timeout in seconds if not specified in the request
default_timeout = 300

# Maximum allowed timeout value in seconds (hard cap)
max_timeout = 3600

# Seconds to wait for a container to stop gracefully before killing
container_stop_timeout = 10

# Seconds between queue poll attempts when no jobs are available
poll_interval = 0.5

[logging]
# Number of days to retain job logs before automatic cleanup
log_retention_days = 30

[warm_pool]
# Whether to keep pre-warmed containers ready for faster cold starts (Phase 2)
enabled = false

# Number of warm containers to maintain in the pool (Phase 2)
size = 0
